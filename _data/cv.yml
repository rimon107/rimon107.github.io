    Research Experience:
      - company: University of Memphis
        position: Graduate Research Assistant
        location: Memphis, TN, USA
        start_date: 2024-01
        end_date: present
        summary: Researching trustworthy autonomous driving, interactive motion planning, conformal risk certification, counterfactual evaluation, and model compression for safe robotics under the supervision of Prof. Myounggyu Won.
        highlights:
          - Designed BucketKD, a safety-aware bucket-based knowledge-distillation framework for compressing end-to-end motion planners in autonomous driving.
          - Developed time-to-collision-guided waypoint attention and adaptive planning-state discretization to preserve safety-relevant trajectory behavior during distillation.
          - Investigating protocol-scoped counterfactual risk certification for interactive autonomous driving, including frozen decision protocols, calibrated upper-risk bounds, abstention-aware selection, and scene-level reliability evaluation.
          - Built scalable experimental pipelines for autonomous-driving research using PyTorch, CARLA, trajectory datasets, JSONL artifacts, and HPC/GPU infrastructure.
          - Co-developed an autoencoder-based stealthy-anomaly detector with a windowed variance-aware loss for vehicular and tactical communication networks, published at IEEE MILCOM 2025.

      - company: Bangladesh University of Engineering and Technology
