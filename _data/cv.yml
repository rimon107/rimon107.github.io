        summary: Conducted research on Bangla speech recognition, low-resource language modeling, and grapheme-to-phoneme conversion under the supervision of Dr. Muhammad Abdullah Adnan.
        highlights:
          - Contributed to peer-reviewed publications at ICASSP, LREC, and NAACL.
          - Built and evaluated sequence-to-sequence and attention-based models for Bangla automatic speech recognition and text/speech processing.
          - Worked on the Samsung Research Bangladesh-funded Bangla Automated Speech Recognition Engine project.

